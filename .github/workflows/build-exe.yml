name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    paths:
      - "calculadora_viagem.py"
      - ".github/workflows/build-exe.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests pyinstaller

      - name: Gerar o executável
        run: pyinstaller --onefile --windowed --name "CalculadoraViagem" calculadora_viagem.py

      - name: Publicar o .exe como artefato
        uses: actions/upload-artifact@v4
        with:
          name: CalculadoraViagem-Windows
          path: dist/CalculadoraViagem.exe
